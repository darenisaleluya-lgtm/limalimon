<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; connect-src https://script.google.com https://script.googleusercontent.com; media-src 'self' blob:; object-src 'none'; base-uri 'none'; form-action 'none'; img-src 'self' data:;">
  <title>Encuesta segura</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main id="app">
    <section id="loginView" class="view active">
      <h1>Encuesta</h1>
      <label for="accessCode">Código de acceso</label>
      <input id="accessCode" type="text" inputmode="text" autocomplete="one-time-code" maxlength="32" placeholder="Ingrese su código">
      <button id="loginBtn" type="button">Continuar</button>
      <p id="loginMsg" class="message" aria-live="polite"></p>
    </section>

    <section id="setupView" class="view">
      <h1>Configurar entorno</h1>
      <p>La encuesta necesita acceso al micrófono y espacio temporal en el teléfono.</p>
      <button id="configureBtn" type="button">Configurar entorno</button>

      <div id="setupStatus" class="statusBox hidden">
        <p><strong>Micrófono:</strong> <span id="micSetupStatus">Pendiente</span></p>
        <p><strong>Almacenamiento:</strong> <span id="storageStatus">Pendiente</span></p>
        <p><strong>Espacio estimado:</strong> <span id="storageEstimate">Pendiente</span></p>
      </div>

      <div id="audioMonitor" class="audioMonitor hidden" aria-label="Nivel del micrófono">
        <div id="audioBar" class="audioBar"></div>
      </div>
      <p id="audioAdvice" class="message" aria-live="polite"></p>

      <div id="testControls" class="hidden">
        <button id="testAudioBtn" type="button" class="secondary">🎧 Probar y escuchar 5 segundos</button>
        <audio id="testPlayer" controls class="hidden"></audio>
      </div>

      <button id="startSurveyBtn" type="button" class="hidden">Iniciar encuesta</button>
      <p id="setupMsg" class="message" aria-live="polite"></p>
    </section>

    <section id="surveyView" class="view surveyView">
      <header class="surveyHeader">
        <div><span id="connectionDot" class="dot offline"></span><span id="connectionText">Sin verificar</span></div>
        <div><span id="micDot" class="dot offline"></span><span id="micText">Micrófono</span></div>
        <div id="progressText">0 / 0</div>
      </header>

      <div class="liveMeter" aria-label="Nivel de audio actual">
        <div id="liveMeterBar"></div>
      </div>
      <p id="liveAdvice" class="advice" aria-live="polite"></p>

      <article class="questionCard">
        <h2 id="questionText"></h2>
        <div id="answerContainer"></div>
      </article>

      <footer class="surveyFooter">
        <p id="saveStatus" class="message"></p>
        <div class="navButtons">
          <button id="backBtn" type="button" class="secondary">Anterior</button>
          <button id="nextBtn" type="button">Siguiente</button>
        </div>
      </footer>
    </section>

    <section id="finishView" class="view">
      <h1>Encuesta finalizada</h1>
      <p id="finishSummary"></p>
      <button id="downloadFullBtn" type="button">Descargar grabación completa</button>
      <button id="retryPendingBtn" type="button" class="secondary">Reintentar envíos pendientes</button>
      <p id="finishMsg" class="message" aria-live="polite"></p>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
