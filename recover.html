<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="referrer" content="no-referrer">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://challenges.cloudflare.com https://script.google.com https://script.googleusercontent.com; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self' blob:; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'none'; form-action 'self'; worker-src 'self'; upgrade-insecure-requests">
  <title>Recuperación de encuesta</title>
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
  <script src="js/config.js"></script>
  <script type="module" src="js/recover.js"></script>
</head>
<body>
  <main class="app-shell recovery-shell">
    <section class="screen screen-active">
      <header class="hero">
        <span class="eyebrow">RECUPERACIÓN LOCAL</span>
        <h1>Descifrar respaldo de encuesta</h1>
        <p>El archivo se procesa en este navegador. La clave no se envía al servidor.</p>
      </header>

      <section class="consent-card recovery-form">
        <label for="package-file"><strong>Archivo cifrado</strong></label>
        <input id="package-file" type="file" accept=".encuesta,application/octet-stream">
        <label for="package-passphrase"><strong>Clave de recuperación</strong></label>
        <input id="package-passphrase" type="password" autocomplete="current-password" placeholder="Clave utilizada durante la encuesta">
        <div id="recover-turnstile" class="turnstile-wrap"></div>
        <button id="decrypt-button" class="primary-button" type="button">Verificar y descifrar</button>
      </section>

      <p id="recover-message" class="message"></p>

      <section id="recovered-content" class="hidden">
        <article class="dialog-card wide-card">
          <h2>Contenido verificado</h2>
          <dl id="manifest-summary" class="summary-list"></dl>
          <div class="finish-actions">
            <button id="sync-answers-button" class="primary-button" type="button">Sincronizar respuestas con Google Sheets</button>
          </div>
        </article>
        <div id="segments-container" class="segments-grid"></div>
      </section>
    </section>
    <div id="recover-overlay" class="blocking-overlay hidden">
      <div class="dialog-card"><div class="spinner"></div><h2>Procesando archivo</h2><p id="recover-overlay-message">No cierre esta pantalla.</p></div>
    </div>
  </main>
</body>
</html>
